<div class="login-page">
  <div class="login-bg-glow"></div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <img src="assets/vm_logo.png" alt="VidyaMine" class="login-logo-img" />
      </div>
      <h1 class="login-brand-name">Vidyamine Content</h1>
      <p class="login-brand-tag">Admin Panel</p>
    </div>

    <div class="login-card-header">
      <h2>Welcome Team (•‿•)</h2>
      <p>Sign in to your admin account</p>
    </div>

    <form (ngSubmit)="submit()" #loginForm="ngForm">
      <div class="form-group">
        <label>Email or Phone</label>
        <input
          type="text"
          [(ngModel)]="identifier"
          name="identifier"
          placeholder="admin@vidyamine.com"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            @if (showPassword) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <div class="error-banner" *ngIf="error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>{{ error }}</span>
      </div>

      <button type="submit" class="btn btn-primary login-submit" [disabled]="loading">
        <div class="spinner" *ngIf="loading"></div>
        <span>{{ loading ? 'Signing in…' : 'Sign in' }}</span>
      </button>
    </form>
  </div>

  <p class="login-footer">© {{ currentYear }} Vidyamine. All rights reserved.</p>
</div>
